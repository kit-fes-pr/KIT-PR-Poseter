services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./.env
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

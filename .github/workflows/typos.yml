name: Typos Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typos:
    name: Check for typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check spelling
        uses: crate-ci/typos@master
